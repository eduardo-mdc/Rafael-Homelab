# Gateway with OIDC — Envoy Gateway + Keycloak
# Extends the base gateway pattern with a SecurityPolicy that enforces OIDC login
# before any request reaches the backend. Envoy handles the full OAuth2 code flow
# (redirect, token exchange, cookie session) — the app itself needs no auth logic.
#
# Prerequisites:
#   1. A client registered in Keycloak (realm: master, client ID: envoy-gateway)
#      with the redirect URI set to https://my-app.duarte-correia.pt/oauth2/callback
#   2. The client secret stored in Bitwarden as "envoy-gateway-oidc-client-secret"
#      (shared across all OIDC-protected apps — Keycloak uses the redirect URL to
#       distinguish them, not a per-app secret)
#   3. A TLS certificate (see certificate.yaml)
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: my-app-gateway
  namespace: my-namespace
spec:
  gatewayClassName: envoy
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: "my-app.duarte-correia.pt"
      allowedRoutes:
        namespaces:
          from: Same
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: my-app-tls-cert
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: my-app-http
  namespace: my-namespace
spec:
  parentRefs:
    - name: my-app-gateway
      namespace: my-namespace
  hostnames:
    - "my-app.duarte-correia.pt"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: my-app
          port: 8000
      sessionPersistence:
        sessionName: my-app-session
        type: Cookie
        absoluteTimeout: 3600s
        cookieConfig:
          lifetimeType: Permanent
---
# ExternalSecret — fetches the shared Keycloak OIDC client secret from Bitwarden.
# The secret name "envoy-gateway-oidc-secret" is referenced by the SecurityPolicy below.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: envoy-gateway-oidc-secret
  namespace: my-namespace
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-secretstore
    kind: ClusterSecretStore
  target:
    name: envoy-gateway-oidc-secret
    creationPolicy: Owner
  data:
    - secretKey: client-secret
      remoteRef:
        key: envoy-gateway-oidc-client-secret
---
# SecurityPolicy — attaches OIDC enforcement to the Gateway.
# All requests are intercepted by Envoy; unauthenticated users are redirected to Keycloak.
# After login, Envoy sets an encrypted session cookie and forwards the request.
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: my-app-oidc
  namespace: my-namespace
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: my-app-gateway
  oidc:
    provider:
      issuer: "https://keycloak.duarte-correia.pt/realms/master"
    clientID: "envoy-gateway"
    clientSecret:
      name: "envoy-gateway-oidc-secret"
    redirectURL: "https://my-app.duarte-correia.pt/oauth2/callback"
    logoutPath: "/logout"
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: my-app-backend-policy
  namespace: my-namespace
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: my-app-http
  timeout:
    http:
      connectionIdleTimeout: 300s
      maxConnectionDuration: 300s
      requestTimeout: 300s
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: ClientTrafficPolicy
metadata:
  name: my-app-client-policy
  namespace: my-namespace
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: my-app-gateway
  timeout:
    http:
      idleTimeout: 300s
