# ExternalSecret — External Secrets Operator + Bitwarden
# Pulls secrets from Bitwarden (via bitwarden-secretstore ClusterSecretStore) and
# creates a native Kubernetes Secret. "key" matches the item name in Bitwarden.
# Use the template block when you need to reshape or combine multiple values.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: my-app-secret
  namespace: my-namespace
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-secretstore
    kind: ClusterSecretStore
  target:
    name: my-app-secret
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: my-app-db-username
    - secretKey: password
      remoteRef:
        key: my-app-db-password
---
# ExternalSecret with template — combine or rename fields before writing the Secret.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: my-app-composed-secret
  namespace: my-namespace
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-secretstore
    kind: ClusterSecretStore
  target:
    name: my-app-composed-secret
    creationPolicy: Owner
    template:
      data:
        DATABASE_URL: "postgresql://{{ .username }}:{{ .password }}@my-app-postgres-rw:5432/app"
  data:
    - secretKey: username
      remoteRef:
        key: my-app-db-username
    - secretKey: password
      remoteRef:
        key: my-app-db-password
