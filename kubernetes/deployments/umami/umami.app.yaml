apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: umami
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: rafael-homelab
  source:
    repoURL: git@github.com:eduardo-mdc/Rafael-Homelab.git
    targetRevision: HEAD
    path: kubernetes/deployments/umami/manifests
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: rafael-homelab
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=true
