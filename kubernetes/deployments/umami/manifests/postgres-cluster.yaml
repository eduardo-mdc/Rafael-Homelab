apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: umami-postgres
  namespace: rafael-homelab
spec:
  # 3 instances (1 primary + 2 replicas) for HA, matching the portfolio cluster.
  instances: 3
  imageName: ghcr.io/cloudnative-pg/postgresql:17.2

  # Cap memory per instance (the cluster is tight on RAM). Without this, each
  # Postgres pod sizes its cache to the node — this bounds all three.
  resources:
    requests:
      cpu: 50m
      memory: 192Mi
    limits:
      memory: 512Mi

  storage:
    # 2Gi was too tight: umami's actual data is ~31MB, but pg_wal grew to 1.8GB and filled
    # the volume, after which CNPG's pre-flight ("Detected low-disk space condition, avoid
    # starting the instance") refused to start Postgres at all. The WAL was pinned by two
    # orphaned replication slots (_cnpg_umami_postgres_1 / _3) left behind when those
    # instances died — a slot makes Postgres retain WAL until a consumer that no longer
    # exists confirms it, so nothing could ever be recycled. Headroom lets the primary boot;
    # CNPG then rebuilds 1 and 3, they drain their slots, and the WAL frees itself.
    size: 5Gi

  bootstrap:
    initdb:
      database: umami
      owner: umami
      # No secret → CNPG generates the owner role + password and publishes a
      # ready connection URI in the umami-postgres-app secret. Umami reads that
      # exact secret, so the app and DB can never have mismatched credentials.
