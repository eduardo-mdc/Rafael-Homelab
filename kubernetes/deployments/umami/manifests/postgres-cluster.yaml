apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: umami-postgres
  namespace: rafael-homelab
spec:
  # Analytics is non-critical; a single instance keeps it light.
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:17.2

  storage:
    size: 2Gi

  bootstrap:
    initdb:
      database: umami
      owner: umami
      secret:
        name: umami-db-secret

  superuserSecret:
    name: umami-db-secret
