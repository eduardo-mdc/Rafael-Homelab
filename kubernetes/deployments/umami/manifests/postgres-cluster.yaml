apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: umami-postgres
  namespace: rafael-homelab
spec:
  # 3 instances (1 primary + 2 replicas) for HA, matching the portfolio cluster.
  instances: 3
  imageName: ghcr.io/cloudnative-pg/postgresql:17.2

  # Cap memory per instance (the cluster is tight on RAM). Without this, each
  # Postgres pod sizes its cache to the node — this bounds all three.
  resources:
    requests:
      cpu: 50m
      memory: 192Mi
    limits:
      memory: 512Mi

  storage:
    size: 2Gi

  bootstrap:
    initdb:
      database: umami
      owner: umami
      # No secret → CNPG generates the owner role + password and publishes a
      # ready connection URI in the umami-postgres-app secret. Umami reads that
      # exact secret, so the app and DB can never have mismatched credentials.
