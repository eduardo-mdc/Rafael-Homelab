apiVersion: networking.cfargotunnel.com/v1alpha1
kind: TunnelBinding
metadata:
  name: umami
  namespace: rafael-homelab
subjects:
  # rafael-analytics.duarte-correia.pt is a 1-level subdomain, so it's covered
  # by Cloudflare Universal SSL (TLS terminates at the edge) — no cert-manager
  # Certificate/Gateway needed, mirroring the rafael-cms tunnel-only setup.
  - name: umami
    spec:
      fqdn: rafael-analytics.duarte-correia.pt
      protocol: http
      http2Origin: true
      noTlsVerify: true
      target: http://umami.rafael-homelab.svc.cluster.local:3000
tunnelRef:
  kind: ClusterTunnel
  name: porto-cluster-tunnel
