apiVersion: apps/v1
kind: Deployment
metadata:
  name: umami
  namespace: rafael-homelab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: umami
  template:
    metadata:
      labels:
        app: umami
    spec:
      containers:
        - name: umami
          image: ghcr.io/umami-software/umami:postgresql-latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: DATABASE_TYPE
              value: postgresql
            # CNPG auto-generates this secret with a matching role + URI.
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: umami-postgres-app
                  key: uri
            - name: APP_SECRET
              valueFrom:
                secretKeyRef:
                  name: umami-app-secret
                  key: APP_SECRET
          # Umami serves /api/heartbeat once the app (and its migrations) are up.
          readinessProbe:
            httpGet:
              path: /api/heartbeat
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/heartbeat
              port: 3000
            initialDelaySeconds: 40
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
