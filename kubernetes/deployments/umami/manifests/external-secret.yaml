# Pulls Umami's DB credentials + app secret from Bitwarden.
# Create these Bitwarden items first (values are your choice; keep the password
# URL-safe since it is interpolated into DATABASE_URL). Named rafael-* to scope
# them on the shared (brother's) infrastructure:
#   "rafael-umami-db-username"  → the PostgreSQL username (e.g. "umami")
#   "rafael-umami-db-password"  → the PostgreSQL password (URL-safe)
#   "rafael-umami-app-secret"   → a random string used to sign Umami sessions
#
# Produces:
#   umami-db-secret   → username, password, DATABASE_URL (used by CNPG too)
#   umami-app-secret  → APP_SECRET
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: umami-db-secret
  namespace: rafael-homelab
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-secretstore
    kind: ClusterSecretStore
  target:
    name: umami-db-secret
    creationPolicy: Owner
    template:
      data:
        username: "{{ .username }}"
        password: "{{ .password }}"
        # CNPG's -rw service is the primary endpoint; Umami runs its own
        # Prisma migrations on startup against this database.
        DATABASE_URL: "postgresql://{{ .username }}:{{ .password }}@umami-postgres-rw:5432/umami"
  data:
    - secretKey: username
      remoteRef:
        key: rafael-umami-db-username
    - secretKey: password
      remoteRef:
        key: rafael-umami-db-password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: umami-app-secret
  namespace: rafael-homelab
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-secretstore
    kind: ClusterSecretStore
  target:
    name: umami-app-secret
    creationPolicy: Owner
  data:
    - secretKey: APP_SECRET
      remoteRef:
        key: rafael-umami-app-secret
