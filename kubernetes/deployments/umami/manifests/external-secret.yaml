# Umami's app secret (session signing). The DB credentials are NOT here —
# CNPG generates the Postgres role and publishes a ready connection URI in the
# umami-postgres-app secret, which the Deployment reads directly. That keeps the
# app and database on one set of credentials (no possible mismatch).
#
# Create this Bitwarden item first:
#   "rafael-umami-app-secret" → a random string used to sign Umami sessions
#
# (The previously-created rafael-umami-db-username / rafael-umami-db-password
# items are no longer used and can be deleted.)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: umami-app-secret
  namespace: rafael-homelab
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-secretstore
    kind: ClusterSecretStore
  target:
    name: umami-app-secret
    creationPolicy: Owner
  data:
    - secretKey: APP_SECRET
      remoteRef:
        key: rafael-umami-app-secret
