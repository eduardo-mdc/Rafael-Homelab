# Celery broker. Ephemeral (no persistence): a queued PipelineJob lost on restart is just
# re-queued from the admin. Cluster-internal only.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cladewright-redis
  namespace: rafael-homelab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cladewright-redis
  template:
    metadata:
      labels:
        app: cladewright-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          # The header above says "ephemeral", but bare `redis-server` uses the built-in
          # defaults, which snapshot RDB files to /data — i.e. onto the container's writable
          # layer, which is node ephemeral-storage. Turn both persistence modes off so the
          # broker really is memory-only and can't contribute to DiskPressure.
          args: ["redis-server", "--save", "", "--appendonly", "no"]
          ports:
            - containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
              ephemeral-storage: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
              ephemeral-storage: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: cladewright-redis
  namespace: rafael-homelab
spec:
  selector:
    app: cladewright-redis
  ports:
    - port: 6379
      targetPort: 6379
