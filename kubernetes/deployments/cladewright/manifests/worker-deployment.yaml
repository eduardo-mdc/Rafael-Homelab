# Pipeline worker: the ONLY thing with Braidworks + the CoL dump. Consumes PipelineJobs
# from Redis (build assets / download the dump). image CMD = `celery -A cladewright worker`.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cladewright-worker
  namespace: rafael-homelab
spec:
  replicas: 1 # concurrency 1; scale builds with more replicas
  strategy:
    type: Recreate # the dump PVC is RWO — don't deadlock a rolling update on the volume
  selector:
    matchLabels:
      app: cladewright-worker
  template:
    metadata:
      labels:
        app: cladewright-worker
    spec:
      containers:
        - name: worker
          image: hydrodog11/cladewright-pipeline:latest
          imagePullPolicy: Always
          env:
            - name: DJANGO_SETTINGS_MODULE
              value: cladewright.settings
            - name: DJANGO_DEBUG
              value: "0"
            - name: CELERY_BROKER_URL
              value: "redis://cladewright-redis:6379/0"
            - name: POSTGRES_DB
              value: "cladewright"
            - name: POSTGRES_HOST
              value: "cladewright-postgres-rw"
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: cladewright-db-secret
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cladewright-db-secret
                  key: password
            - name: DJANGO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: cladewright-app-secret
                  key: DJANGO_SECRET_KEY
          volumeMounts:
            - name: dump
              mountPath: /app/data
          resources:
            requests:
              cpu: 200m
              memory: 1Gi
            limits:
              # A build holds the dump + backbone index in RAM; give it room.
              cpu: 2000m
              memory: 4Gi
      volumes:
        - name: dump
          persistentVolumeClaim:
            claimName: cladewright-dump
