# Pulls Cladewright's secrets from Bitwarden. Create these Bitwarden items:
#   cladewright-rafael-django-secret-key       → Django SECRET_KEY
#   cladewright-rafael-db-username / -password → Postgres user/pass (CNPG bootstrap + app)
#   cladewright-rafael-google-oauth-client-id  → Google OAuth client id
#   cladewright-rafael-google-oauth-secret     → Google OAuth client secret
#
# Produces two Secrets:
#   cladewright-app-secret → DJANGO_SECRET_KEY, GOOGLE_OAUTH_CLIENT_ID, GOOGLE_OAUTH_SECRET
#   cladewright-db-secret  → username, password (used by CNPG bootstrap too)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cladewright-app-secret
  namespace: rafael-homelab
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-secretstore
    kind: ClusterSecretStore
  target:
    name: cladewright-app-secret
    creationPolicy: Owner
  data:
    - secretKey: DJANGO_SECRET_KEY
      remoteRef:
        key: cladewright-rafael-django-secret-key
    - secretKey: GOOGLE_OAUTH_CLIENT_ID
      remoteRef:
        key: cladewright-rafael-google-oauth-client-id
    - secretKey: GOOGLE_OAUTH_SECRET
      remoteRef:
        key: cladewright-rafael-google-oauth-secret
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cladewright-db-secret
  namespace: rafael-homelab
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-secretstore
    kind: ClusterSecretStore
  target:
    name: cladewright-db-secret
    creationPolicy: Owner
    template:
      data:
        username: "{{ .username }}"
        password: "{{ .password }}"
  data:
    - secretKey: username
      remoteRef:
        key: cladewright-rafael-db-username
    - secretKey: password
      remoteRef:
        key: cladewright-rafael-db-password
