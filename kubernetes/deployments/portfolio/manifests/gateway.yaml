apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: portfolio-gateway
  namespace: rafael-homelab
spec:
  gatewayClassName: envoy
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: "rafael.duarte-correia.pt"
      allowedRoutes:
        namespaces:
          from: Same
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: portfolio-tls-cert
    # Internal-only CMS host. Same Gateway, distinct hostname + cert. Has no
    # public DNS record — reachable only via LAN DNS pointing at this Gateway.
    - name: https-cms
      protocol: HTTPS
      port: 443
      hostname: "cms.rafael.duarte-correia.pt"
      allowedRoutes:
        namespaces:
          from: Same
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: portfolio-cms-tls-cert
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: portfolio-http
  namespace: rafael-homelab
spec:
  parentRefs:
    - name: portfolio-gateway
      namespace: rafael-homelab
      sectionName: https
  hostnames:
    - "rafael.duarte-correia.pt"
  rules:
    # Public site → the frontend, which proxies /api, /media, /documents and
    # /resume back to the backend in-cluster. The CMS/admin surface is NOT here;
    # it lives on the internal cms. host below.
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: portfolio-frontend
          port: 8000
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: portfolio-cms-http
  namespace: rafael-homelab
spec:
  parentRefs:
    - name: portfolio-gateway
      namespace: rafael-homelab
      sectionName: https-cms
  hostnames:
    - "cms.rafael.duarte-correia.pt"
  rules:
    # The whole Django/Wagtail surface (/cms, /admin, /static, /api, /media,
    # /documents, /resume) straight off the backend — internal access only.
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: portfolio
          port: 3000
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: portfolio-backend-policy
  namespace: rafael-homelab
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: portfolio-http
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: portfolio-cms-http
  timeout:
    http:
      connectionIdleTimeout: 300s
      maxConnectionDuration: 300s
      requestTimeout: 60s
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: ClientTrafficPolicy
metadata:
  name: portfolio-client-policy
  namespace: rafael-homelab
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: portfolio-gateway
  timeout:
    http:
      idleTimeout: 300s
