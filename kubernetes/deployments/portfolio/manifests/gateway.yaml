apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: portfolio-gateway
  namespace: portfolio
spec:
  gatewayClassName: envoy
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: "rafael.duarte-correia.pt"
      allowedRoutes:
        namespaces:
          from: Same
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: portfolio-tls-cert
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: portfolio-http
  namespace: portfolio
spec:
  parentRefs:
    - name: portfolio-gateway
      namespace: portfolio
  hostnames:
    - "rafael.duarte-correia.pt"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: portfolio
          port: 8000
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: portfolio-backend-policy
  namespace: portfolio
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: portfolio-http
  timeout:
    http:
      connectionIdleTimeout: 300s
      maxConnectionDuration: 300s
      requestTimeout: 60s
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: ClientTrafficPolicy
metadata:
  name: portfolio-client-policy
  namespace: portfolio
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: portfolio-gateway
  timeout:
    http:
      idleTimeout: 300s
