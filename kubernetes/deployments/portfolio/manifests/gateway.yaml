apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: portfolio-gateway
  namespace: rafael-homelab
spec:
  gatewayClassName: envoy
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: "rafael.duarte-correia.pt"
      allowedRoutes:
        namespaces:
          from: Same
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: portfolio-tls-cert
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: portfolio-http
  namespace: rafael-homelab
spec:
  parentRefs:
    - name: portfolio-gateway
      namespace: rafael-homelab
  hostnames:
    - "rafael.duarte-correia.pt"
  rules:
    # CMS / Django admin + their static assets stay on the backend (the frontend
    # does not proxy these). Reachable via this (LAN) Gateway; the WAN tunnel
    # points only at the frontend, so /cms is not publicly exposed.
    - matches:
        - path:
            type: PathPrefix
            value: /cms
        - path:
            type: PathPrefix
            value: /admin
        - path:
            type: PathPrefix
            value: /static
      backendRefs:
        - name: portfolio
          port: 3000
    # Everything else → the public frontend, which proxies /api, /media,
    # /documents and /resume back to the backend in-cluster.
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: portfolio-frontend
          port: 8000
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: portfolio-backend-policy
  namespace: rafael-homelab
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: portfolio-http
  timeout:
    http:
      connectionIdleTimeout: 300s
      maxConnectionDuration: 300s
      requestTimeout: 60s
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: ClientTrafficPolicy
metadata:
  name: portfolio-client-policy
  namespace: rafael-homelab
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: portfolio-gateway
  timeout:
    http:
      idleTimeout: 300s
