apiVersion: networking.cfargotunnel.com/v1alpha1
kind: TunnelBinding
metadata:
  name: portfolio
  namespace: rafael-homelab
subjects:
  - name: portfolio
    spec:
      fqdn: rafael-new.duarte-correia.pt
      protocol: http
      http2Origin: true
      noTlsVerify: true
      target: http://portfolio.rafael-homelab.svc.cluster.local:8000
tunnelRef:
  kind: ClusterTunnel
  name: porto-cluster-tunnel
