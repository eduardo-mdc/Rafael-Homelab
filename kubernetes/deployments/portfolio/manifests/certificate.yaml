apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: portfolio-tls-cert
  namespace: rafael-homelab
spec:
  secretName: portfolio-tls-cert
  issuerRef:
    name: letsencrypt-cloudflare-prod
    kind: ClusterIssuer
  dnsNames:
    - rafael.duarte-correia.pt
---
# CMS host cert for the LAN/Gateway path (Envoy terminates TLS with this).
# Single-level subdomain so Cloudflare's Universal SSL also covers it for the
# tunnel path (2-level cms.rafael.* was not covered → SSL_ERROR_NO_CYPHER_OVERLAP).
# Issued via DNS-01, so it needs no public A/CNAME record of its own.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: portfolio-cms-tls-cert
  namespace: rafael-homelab
spec:
  secretName: portfolio-cms-tls-cert
  issuerRef:
    name: letsencrypt-cloudflare-prod
    kind: ClusterIssuer
  dnsNames:
    - rafael-cms.duarte-correia.pt
