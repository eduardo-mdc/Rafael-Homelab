# Pulls DJANGO_SECRET_KEY and DB credentials from Bitwarden.
# Bitwarden items:
#   "portfolio-rafael-django-secret-key" → the Django SECRET_KEY value
#   "portfolio-rafael-db-username"       → the PostgreSQL username
#   "portfolio-rafael-db-password"       → the PostgreSQL password
#
# This produces two Secrets:
#   portfolio-app-secret  → DJANGO_SECRET_KEY
#   portfolio-db-secret   → username, password, DATABASE_URL (used by CNPG bootstrap too)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: portfolio-app-secret
  namespace: rafael-homelab
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-secretstore
    kind: ClusterSecretStore
  target:
    name: portfolio-app-secret
    creationPolicy: Owner
  data:
    - secretKey: DJANGO_SECRET_KEY
      remoteRef:
        key: portfolio-rafael-django-secret-key
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: portfolio-db-secret
  namespace: rafael-homelab
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-secretstore
    kind: ClusterSecretStore
  target:
    name: portfolio-db-secret
    creationPolicy: Owner
    template:
      data:
        username: "{{ .username }}"
        password: "{{ .password }}"
  data:
    - secretKey: username
      remoteRef:
        key: portfolio-rafael-db-username
    - secretKey: password
      remoteRef:
        key: portfolio-rafael-db-password
