apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: portfolio-postgres
  namespace: rafael-homelab
spec:
  instances: 3
  imageName: ghcr.io/cloudnative-pg/postgresql:17.2

  storage:
    size: 5Gi

  bootstrap:
    initdb:
      database: portfolio
      owner: portfolio
      secret:
        name: portfolio-db-secret

  superuserSecret:
    name: portfolio-db-secret

