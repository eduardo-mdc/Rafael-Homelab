apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio
  namespace: rafael-homelab
  annotations:
    # The live object still carries spec.strategy.rollingUpdate from when it
    # defaulted to RollingUpdate; a strategic-merge apply can't drop it, so
    # switching to Recreate is rejected ("may not be specified when strategy
    # type is 'Recreate'"). Replace rewrites the whole object, clearing it.
    argocd.argoproj.io/sync-options: Replace=true
spec:
  replicas: 1
  # The media PVC is ReadWriteOnce, so a rolling update deadlocks: the new pod
  # can't attach the volume the old pod still holds. Recreate stops the old pod
  # first (brief downtime) then starts the new one.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: portfolio
  template:
    metadata:
      labels:
        app: portfolio
    spec:
      containers:
        - name: portfolio
          image: hydrodog11/portfolio:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: DJANGO_SETTINGS_MODULE
              value: portfolio.settings.prod
            - name: APP_HOST
              value: "0.0.0.0"
            - name: APP_PORT
              value: "3000"
            # Frontend proxies with Host = the internal Service it targets, so
            # the in-cluster name must be allowed alongside the public domain.
            - name: DJANGO_ALLOWED_HOSTS
              value: "rafael.duarte-correia.pt,cms.rafael.duarte-correia.pt,portfolio,portfolio.rafael-homelab.svc.cluster.local"
            # cms. host is where the admin lives now, so its origin must be
            # trusted for the login/CSRF POST.
            - name: CSRF_TRUSTED_ORIGINS
              value: "https://rafael.duarte-correia.pt,https://cms.rafael.duarte-correia.pt"
            - name: WAGTAIL_BASE_URL
              value: "https://rafael.duarte-correia.pt"
            - name: DJANGO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: portfolio-app-secret
                  key: DJANGO_SECRET_KEY
            - name: POSTGRES_DB
              value: "portfolio"
            - name: POSTGRES_HOST
              value: "portfolio-postgres-rw"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: portfolio-db-secret
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: portfolio-db-secret
                  key: password
          volumeMounts:
            - name: media
              mountPath: /app/media
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 90
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 90
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      volumes:
        - name: media
          persistentVolumeClaim:
            claimName: portfolio-media
