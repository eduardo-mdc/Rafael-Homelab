# Palworld dedicated server (1.0 / current public build).
#
# Image: hydrodog11/palworld, built from github.com/rafaelmdc/palworld — a thin layer over
# thijsvanloef/palworld-server-docker, so we control when the server moves and Argo's
# image-updater can roll it by digest (see the annotations on palworld.app.yaml).
#
# Underneath it is a SteamCMD wrapper: on every boot it installs/updates app 2394010 into
# /palworld, writes PalWorldSettings.ini from the env below, then runs PalServer.sh.
# There is no "1.0" image tag — the game version comes from Steam, so 1.0 is simply what
# UPDATE_ON_BOOT pulls. To freeze on a build, set UPDATE_ON_BOOT=false after the first
# successful start; the installed build then stays put across restarts.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: palworld
  namespace: rafael-homelab
  labels:
    app.kubernetes.io/name: palworld
spec:
  replicas: 1 # one process owns the world save; never scale this
  strategy:
    # RWO volume + a server that writes the save in place: the old pod must be gone
    # before the new one attaches. RollingUpdate would deadlock on the volume.
    type: Recreate
  selector:
    matchLabels:
      app: palworld
  template:
    metadata:
      labels:
        app: palworld
    spec:
      # The image traps SIGTERM, runs an RCON "save" + "shutdown", and waits for the
      # world to flush. Killing it early is how you lose the last few minutes of play.
      terminationGracePeriodSeconds: 120
      containers:
        - name: palworld
          image: hydrodog11/palworld:latest
          imagePullPolicy: Always
          ports:
            - name: game
              containerPort: 8211
              protocol: UDP
            - name: query
              containerPort: 27015
              protocol: UDP
            - name: rcon
              containerPort: 25575
              protocol: TCP
          env:
            - name: TZ
              value: "Europe/Lisbon"
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: PORT
              value: "8211"
            - name: QUERY_PORT
              value: "27015"
            # Dropped from 16: this is a 3-4 player server, and the headroom is better
            # spent on the raised base/item limits below than on 12 slots nobody uses.
            # Each connected player costs roughly 400-500 MB.
            - name: PLAYERS
              value: "8"
            - name: MULTITHREADING
              value: "true"
            # Keep everything on death. Default is "Item" (drop your inventory, keep gear
            # and Pals). Other values: ItemAndEquipment, All (also drops your party Pals).
            - name: DEATH_PENALTY
              value: "None"
            # ---- limits loosened for a 3-4 player server -------------------------------
            # Every one of these defaults exists to protect a busy public server from the
            # cost of persistent actors. With four people on a box with 12Gi and 4 cores,
            # that budget is better spent on the world than held in reserve.
            #
            # No structure decay. This is the one that actually bites a small server: bases
            # rot while nobody is logged in, so a week off means coming back to rubble.
            - name: BUILD_OBJECT_DETERIORATION_DAMAGE_RATE
              value: "0.000000"
            # Pals working per base, 15 -> 20. 20 is as high as the game's own settings UI
            # goes; this is the single biggest AI cost on the server, which is exactly why
            # the default is conservative.
            - name: BASE_CAMP_WORKER_MAX_NUM
              value: "20"
            # Bases per guild, 4 -> 10. The global cap (BASE_CAMP_MAX_NUM, 128) is untouched
            # and nowhere near reachable at this player count.
            - name: BASE_CAMP_MAX_NUM_IN_GUILD
              value: "10"
            # Dropped loot survives a day instead of an hour, so a death far from base isn't
            # an automatic total loss and you can log off mid-haul.
            - name: DROP_ITEM_ALIVE_MAX_HOURS
              value: "24.000000"
            # Ceiling on simultaneous dropped items, raised in step with the lifetime above
            # (things persisting 24x longer accumulate). Each is a live actor, so this is
            # the setting to walk back first if the server ever gets sluggish.
            - name: DROP_ITEM_MAX_NUM
              value: "5000"
            # No penalty for logging off — pointless friction on a server where everyone
            # plays on their own schedule.
            - name: ENABLE_NON_LOGIN_PENALTY
              value: "False"
            # ---------------------------------------------------------------------------
            - name: SERVER_NAME
              value: "Rafael's Palworld Server"
            - name: SERVER_DESCRIPTION
              value: "Hosted on the porto homelab cluster"
            # Community listing needs a public IPv4 on the query port AND an empty server
            # password. This server is password-gated, so it stays off — join by IP.
            - name: COMMUNITY
              value: "false"
            - name: UPDATE_ON_BOOT
              value: "true"
            - name: RCON_ENABLED
              value: "true"
            - name: RCON_PORT
              value: "25575"
            # Hourly world backup into /palworld/backups, kept for a week. This is the only
            # copy of the save that survives a corrupted world file, so leave it on.
            - name: BACKUP_ENABLED
              value: "true"
            - name: BACKUP_CRON_EXPRESSION
              value: "0 * * * *"
            - name: DELETE_OLD_BACKUPS
              value: "true"
            - name: OLD_BACKUP_DAYS
              value: "7"
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: palworld-secret
                  key: ADMIN_PASSWORD
            - name: SERVER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: palworld-secret
                  key: SERVER_PASSWORD
            - name: RCON_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: palworld-secret
                  key: ADMIN_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /palworld
          # First boot downloads ~10 GB through SteamCMD before the server ever listens,
          # so the startup probe gets 30 minutes before liveness starts counting.
          startupProbe:
            tcpSocket:
              port: 25575
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 60
          livenessProbe:
            tcpSocket:
              port: 25575
            periodSeconds: 30
            failureThreshold: 4
          resources:
            requests:
              cpu: "1"
              memory: 6Gi
            limits:
              # Palworld's memory climbs with world size and player count and it does not
              # give it back — 8 GB is the documented floor for a populated server and the
              # OOM killer here means a hard world reload, so the limit is generous.
              cpu: "4"
              memory: 12Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: palworld-data
