# Backing Services. Nothing is type LoadBalancer here — the Gateway owns the external IP
# (see gateway.yaml), which is what gets the palworld.duarte-correia.pt record.
apiVersion: v1
kind: Service
metadata:
  name: palworld
  namespace: rafael-homelab
  labels:
    app.kubernetes.io/name: palworld
spec:
  type: ClusterIP
  # Pinned, not dynamic: tailscale-relay.yaml forwards to this address via TS_DEST_IP,
  # which takes a literal IP. If the Service were ever recreated and handed a different
  # ClusterIP, the tailnet node would silently forward into nothing. This is the address
  # Kubernetes already assigned, so pinning it changes nothing today.
  clusterIP: 10.43.146.235
  selector:
    app: palworld
  ports:
    - name: game
      port: 8211
      targetPort: 8211
      protocol: UDP
    - name: query
      port: 27015
      targetPort: 27015
      protocol: UDP
---
# RCON stays in-cluster only — it is a plaintext admin shell. Reach it with:
#   kubectl -n rafael-homelab exec deploy/palworld -- rcon-cli "ShowPlayers"
apiVersion: v1
kind: Service
metadata:
  name: palworld-rcon
  namespace: rafael-homelab
  labels:
    app.kubernetes.io/name: palworld
spec:
  type: ClusterIP
  selector:
    app: palworld
  ports:
    - name: rcon
      port: 25575
      targetPort: 25575
      protocol: TCP
# NOTE: there was a `tailscale.com/expose` Service here, which the operator published on
# munchkin-cloud.ts.net. It is gone, replaced by tailscale-relay.yaml. Two reasons: the
# operator tags its proxies and Tailscale refuses to share a tagged machine, and that
# tailnet is Eduardo's, so nothing on it is ours to share. Don't re-add it — you would end
# up with two machines called "palworld" and only one of them shareable.
