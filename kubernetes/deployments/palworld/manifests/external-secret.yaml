# Pulls the Palworld passwords from Bitwarden. Create these Bitwarden items first —
# the pod stays in CreateContainerConfigError until the Secret exists:
#   rafael-palworld-admin-password   → in-game admin + RCON password
#   rafael-palworld-server-password  → password players type to join
#
# Produces one Secret: palworld-secret → ADMIN_PASSWORD, SERVER_PASSWORD
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: palworld-secret
  namespace: rafael-homelab
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-secretstore
    kind: ClusterSecretStore
  target:
    name: palworld-secret
    creationPolicy: Owner
  data:
    - secretKey: ADMIN_PASSWORD
      remoteRef:
        key: rafael-palworld-admin-password
    - secretKey: SERVER_PASSWORD
      remoteRef:
        key: rafael-palworld-server-password
