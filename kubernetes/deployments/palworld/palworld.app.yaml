# The manifests for this one live in their own repo: github.com/rafaelmdc/palworld
# (public, so Argo reads it over plain HTTPS — no deploy key, no repository Secret).
# Only the Application stays here, because this directory is what the `deployments` app
# syncs; an Application in the palworld repo would have nothing pointing at it.
#
# HEADS UP — the rafael-homelab AppProject currently pins
#   sourceRepos: ["git@github.com:eduardo-mdc/Rafael-Homelab.git"]
# so Argo will reject this app with "application repo ... is not permitted in project"
# until https://github.com/rafaelmdc/palworld.git is added to that list. The AppProject is
# defined in Eduardo's cluster repo, not this one.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: palworld
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: rafael-homelab
  source:
    repoURL: https://github.com/rafaelmdc/palworld.git
    targetRevision: HEAD
    path: manifests
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: rafael-homelab
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=true
