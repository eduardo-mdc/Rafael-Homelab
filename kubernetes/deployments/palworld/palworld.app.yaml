apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: palworld
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    # The image is built from github.com/rafaelmdc/palworld (a thin layer over the upstream
    # community server image) and pushed to Docker Hub. Same digest-on-latest flow as
    # cladewright: a push there rolls the pod here, written back to this repo.
    argocd-image-updater.argoproj.io/image-list: palworld=hydrodog11/palworld
    argocd-image-updater.argoproj.io/palworld.update-strategy: digest
    argocd-image-updater.argoproj.io/palworld.tag-filter: latest
    argocd-image-updater.argoproj.io/write-back-method: git
    argocd-image-updater.argoproj.io/git-branch: main
spec:
  project: rafael-homelab
  source:
    repoURL: git@github.com:eduardo-mdc/Rafael-Homelab.git
    targetRevision: HEAD
    path: kubernetes/deployments/palworld/manifests
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: rafael-homelab
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=true
